<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760" viewBox="0 0 1400 760">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#577da8" />
    </marker>
    <style>
      .title { font: 700 34px Arial, sans-serif; fill: #253446; }
      .subtitle { font: 400 18px Arial, sans-serif; fill: #5c6b7c; }
      .box { fill: #eef4fa; stroke: #92b1d9; stroke-width: 2; rx: 18; }
      .box2 { fill: #f7f9fc; stroke: #c1d8e9; stroke-width: 2; rx: 18; }
      .accent { fill: #f6c8b6; stroke: #d59d88; stroke-width: 2; rx: 18; }
      .text { font: 600 22px Arial, sans-serif; fill: #2b3b4f; }
      .small { font: 500 17px Arial, sans-serif; fill: #526173; }
      .line { stroke: #577da8; stroke-width: 4; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #93a7bf; stroke-width: 3; fill: none; stroke-dasharray: 10 8; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect width="1400" height="760" fill="#ffffff"/>
  <text x="70" y="70" class="title">Retrieval-Augmented Generation Workflow</text>
  <text x="70" y="104" class="subtitle">Example public workflow figure for engineering-figure-banana</text>

  <rect x="70" y="170" width="180" height="88" class="box"/>
  <text x="160" y="215" text-anchor="middle" class="text">Documents</text>
  <text x="160" y="242" text-anchor="middle" class="small">PDF / DOCX / Images</text>

  <rect x="300" y="170" width="180" height="88" class="box"/>
  <text x="390" y="215" text-anchor="middle" class="text">OCR + Parsing</text>
  <text x="390" y="242" text-anchor="middle" class="small">Text normalization</text>

  <rect x="530" y="170" width="180" height="88" class="box"/>
  <text x="620" y="215" text-anchor="middle" class="text">Chunking</text>
  <text x="620" y="242" text-anchor="middle" class="small">Semantic segments</text>

  <rect x="760" y="170" width="180" height="88" class="box"/>
  <text x="850" y="215" text-anchor="middle" class="text">Embedding</text>
  <text x="850" y="242" text-anchor="middle" class="small">Dense vectors</text>

  <rect x="990" y="150" width="250" height="128" class="box2"/>
  <text x="1115" y="205" text-anchor="middle" class="text">Vector Index</text>
  <text x="1115" y="234" text-anchor="middle" class="small">FAISS / Milvus / pgvector</text>

  <rect x="180" y="410" width="190" height="88" class="accent"/>
  <text x="275" y="455" text-anchor="middle" class="text">User Query</text>
  <text x="275" y="482" text-anchor="middle" class="small">Question + constraints</text>

  <rect x="430" y="410" width="190" height="88" class="box"/>
  <text x="525" y="455" text-anchor="middle" class="text">Retriever</text>
  <text x="525" y="482" text-anchor="middle" class="small">Top-k recall</text>

  <rect x="680" y="410" width="190" height="88" class="box"/>
  <text x="775" y="455" text-anchor="middle" class="text">Reranker</text>
  <text x="775" y="482" text-anchor="middle" class="small">Cross-encoder scoring</text>

  <rect x="930" y="390" width="220" height="128" class="box2"/>
  <text x="1040" y="438" text-anchor="middle" class="text">LLM Synthesis</text>
  <text x="1040" y="468" text-anchor="middle" class="small">Grounded answer generation</text>
  <text x="1040" y="495" text-anchor="middle" class="small">with retrieved evidence</text>

  <rect x="1200" y="410" width="150" height="88" class="accent"/>
  <text x="1275" y="455" text-anchor="middle" class="text">Answer</text>
  <text x="1275" y="482" text-anchor="middle" class="small">User-facing output</text>

  <path d="M250 214 H300" class="line"/>
  <path d="M480 214 H530" class="line"/>
  <path d="M710 214 H760" class="line"/>
  <path d="M940 214 H990" class="line"/>
  <path d="M370 454 H430" class="line"/>
  <path d="M620 454 H680" class="line"/>
  <path d="M870 454 H930" class="line"/>
  <path d="M1150 454 H1200" class="line"/>
  <path d="M1115 278 V338 H525 V410" class="dash"/>
  <path d="M1115 278 V338 H775 V410" class="dash"/>

  <text x="1115" y="333" text-anchor="middle" class="small">retrieval candidates</text>
  <text x="720" y="565" class="small">Main path: ingestion ? indexing ? retrieval ? reranking ? grounded generation</text>
</svg>